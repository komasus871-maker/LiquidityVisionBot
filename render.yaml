services:
  - type: web
    name: liquidity-vision-intelligence
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: BOT_TOKEN
        sync: false
      - key: SIGNAL_CHECK_INTERVAL
        value: "60"
      - key: OBSERVATION_CHECK_INTERVAL
        value: "300"
      - key: SIGNAL_MONITOR_BATCH
        value: "25"
      - key: SIGNAL_MONITOR_CONCURRENCY
        value: "5"
      - key: PREMIUM_STARS
        value: "199"
      - key: PREMIUM_DAYS
        value: "30"
