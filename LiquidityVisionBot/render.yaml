services:
  - type: worker
    name: liquidity-vision-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    autoDeploy: true
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATA_DIR
        value: data
      - key: SIGNAL_CHECK_INTERVAL
        value: "60"
      - key: SIGNAL_MONITOR_BATCH
        value: "25"
      - key: SIGNAL_MONITOR_CONCURRENCY
        value: "5"
